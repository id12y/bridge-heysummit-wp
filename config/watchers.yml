    url: "https://workspaceupdates.googleblog.com/feeds/posts/default"
    trust: 0.95
    category_hints: ["mailbox_provider_policy", "esp_vendor_ecosystem"]

  - id: google_sender_guidelines
    name: "Gmail Sender Guidelines"
