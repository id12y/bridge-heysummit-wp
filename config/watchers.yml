# EmailExpert News Agent - Comprehensive Source List
# Curated for emailexpert.com editorial coverage
# Last updated: January 2025

db_path: data/news.db

fetch:
  user_agent: "emailexpert-news-agent/0.1 (contact: editor@emailexpert.com)"
  timeout_seconds: 30
  max_items_per_source: 50
  per_domain_delay_seconds: 1.5

report:
  top_n_per_category: 10
  include_uncategorized: true

# =============================================================================
# CATEGORIES & KEYWORDS
# =============================================================================

categories:
  mailbox_provider_policy:
    keywords:
      - "postmaster"
      - "bulk sender"
