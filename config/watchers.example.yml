# Copy to config/watchers.yml and customize.
# Notes:
# - Keep "sources" curated and high-signal; add broad discovery via google_news_rss only where needed.
# - Each item can map to multiple categories (multi-label).

db_path: data/news.db

fetch:
  user_agent: "emailexpert-news-agent/0.1 (contact: editor@emailexpert.com)"
  timeout_seconds: 25
  max_items_per_source: 40
  per_domain_delay_seconds: 1.0

report:
  top_n_per_category: 7
  include_uncategorized: true

categories:
  mailbox_provider_policy:
    keywords:
      - "postmaster"
      - "bulk sender"
      - "sender requirements"
      - "one-click unsubscribe"
      - "complaint rate"
      - "spam rate"
      - "throttl"
      - "rate limit"
      - "sender hub"
      - "postmaster tools"
  authentication_identity:
    keywords: ["spf", "dkim", "dmarc", "alignment", "bimi", "vMC", "brand indicators"]
  deliverability_incidents:
    keywords: ["outage", "degradation", "inbox", "spam folder", "block", "blacklist", "rate limit", "deferral"]
  privacy_measurement:
    keywords: ["mail privacy protection", "mpp", "prefetch", "proxy", "open rate", "tracking", "bot opens"]
  security_abuse_fraud:
    keywords: ["phishing", "spoof", "impersonation", "bec", "malware", "credential", "brand abuse"]
  regulation_compliance:
    keywords: ["gdpr", "canspam", "casl", "enforcement", "fine", "consent", "unsubscribe"]
  standards_governance:
    keywords: ["ietf", "rfc", "draft", "m3aawg", "smtp", "imap", "dane", "mtasts", "tls-rpt"]
  esp_vendor_ecosystem:
    keywords: ["esp", "email service provider", "mta", "roadmap", "pricing", "acquisition", "merger", "security bulletin"]
  applied_marketing_design:
    keywords: ["html email", "css support", "dark mode", "accessibility", "amp for email", "schema", "structured data"]
  data_research_benchmarks:
    keywords: ["benchmark", "study", "dataset", "report", "survey", "longitudinal"]
  people_governance_education:
    keywords: ["working group", "conference", "summit", "webinar", "training", "guidance"]
  forward_looking_analysis:
    keywords: ["forecast", "next", "roadmap", "trend", "what to expect"]

sources:
  # --- Canonical / primary sources (examples) ---
  - id: yahoo_postmaster_blog
    name: "Postmaster @ Yahoo & AOL"
    type: web_list
    start_urls:
      - "https://blog.postmaster.yahooinc.com/"
    allow_domains: ["blog.postmaster.yahooinc.com"]
    item_url_regex: "/post/"
    fetch_full_text: true
    trust: 0.95
    category_hints: ["mailbox_provider_policy", "deliverability_incidents", "authentication_identity"]

  - id: google_sender_guidelines
    name: "Gmail sender guidelines (Google Admin Help)"
    type: web_snapshot
    url: "https://support.google.com/a/answer/14229414?hl=en"
    trust: 0.95
    category_hints: ["mailbox_provider_policy", "authentication_identity", "regulation_compliance"]

  - id: google_workspace_updates
    name: "Google Workspace Updates"
    type: rss
    url: "https://workspaceupdates.googleblog.com/feeds/posts/default"
    trust: 0.9
    category_hints: ["mailbox_provider_policy"]

  - id: microsoft_defender_o365_blog
    name: "Microsoft Defender for Office 365 Blog"
    type: web_list
    start_urls:
      - "https://techcommunity.microsoft.com/category/microsoft-defender-for-office-365/blog/microsoftdefenderforoffice365blog"
    allow_domains: ["techcommunity.microsoft.com"]
    item_url_regex: "/blog/"
    fetch_full_text: true
    trust: 0.85
    category_hints: ["security_abuse_fraud", "deliverability_incidents"]

  - id: apple_mpp_privacy_page
    name: "Apple Mail Privacy Protection (Legal)"
    type: web_snapshot
    url: "https://www.apple.com/legal/privacy/data/en/mail-privacy-protection/"
    trust: 0.95
    category_hints: ["privacy_measurement"]

  # --- Broader discovery (high recall, lower precision) ---
  - id: google_news_bulk_sender_rules
    name: "Google News: bulk sender requirements"
    type: google_news_rss
    query: '(Gmail OR Yahoo OR Microsoft) (bulk sender OR "sender requirements" OR postmaster) (DMARC OR DKIM OR SPF OR unsubscribe)'
    hl: "en-US"
    gl: "US"
    ceid: "US:en"
    trust: 0.4
    category_hints: ["mailbox_provider_policy", "authentication_identity", "deliverability_incidents"]
