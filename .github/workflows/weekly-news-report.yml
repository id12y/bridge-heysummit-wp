name: Weekly News Report

on:
  schedule:
    - cron: '0 7 * * 5'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: mkdir -p data reports

      - name: Ingest news sources
        run: python -m emailexpert_news_agent ingest --config config/watchers.yml

      - name: Generate weekly report
        run: |
          DATE=$(date +%Y-%m-%d)
          python -m emailexpert_news_agent report --config config/watchers.yml --days 7 --out reports/weekly-${DATE}.md
          echo "REPORT_FILE=reports/weekly-${DATE}.md" >> $GITHUB_ENV
          echo "REPORT_DATE=${DATE}" >> $GITHUB_ENV

      - name: Convert markdown to HTML for email
        run: |
          pip install markdown
          python << 'EOF'
          import markdown
          import os
          
          md_file = os.environ['REPORT_FILE']
          with open(md_file, 'r') as f:
              md_content = f.read()
          
          html_body = markdown.markdown(md_content, extensions=['tables', 'fenced_code'])
          
          # Wrap in nice email template
          html_email = f"""
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }}
              h1 {{ color: #1a1a1a; border-bottom: 2px solid #0066cc; padding-bottom: 10px; }}
              h2 {{ color: #0066cc; margin-top: 30px; }}
              ul {{ padding-left: 20px; }}
              li {{ margin-bottom: 12px; }}
              a {{ color: #0066cc; text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
              em {{ color: #666; font-size: 0.9em; }}
              blockquote {{ border-left: 3px solid #0066cc; padding-left: 15px; margin-left: 0; color: #555; }}
            </style>
          </head>
          <body>
          {html_body}
          <hr style="margin-top: 40px; border: none; border-top: 1px solid #ddd;">
          <p style="color: #888; font-size: 0.85em;">Generated by EmailExpert News Agent • <a href="https://emailexpert.com">emailexpert.com</a></p>
          </body>
          </html>
          """
          
          with open('reports/email-body.html', 'w') as f:
              f.write(html_email)
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_id }}
          path: reports/*.md
          retention-days: 90

      - name: Email report
        if: ${{ vars.EMAIL_ENABLED == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "📬 EmailExpert Weekly News Briefing - ${{ env.REPORT_DATE }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          html_body: file://reports/email-body.html
          attachments: ${{ env.REPORT_FILE }}
