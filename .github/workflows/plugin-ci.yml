name: emailexpert Events CI

on:
  push:
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Register WPCS standards
        run: |
          vendor/bin/phpcs --config-set installed_paths \
            "$PWD/vendor/wp-coding-standards/wpcs,$PWD/vendor/phpcsstandards/phpcsutils,$PWD/vendor/phpcsstandards/phpcsextra"

      - name: Lint (PHPCS / WordPress Coding Standards)
        run: vendor/bin/phpcs

      - name: PHP syntax check (including Elementor module)
        run: |
          find src templates blocks -name '*.php' -print0 | xargs -0 -n1 php -l > /dev/null
          php -l emailexpert-events.php > /dev/null
          php -l uninstall.php > /dev/null

      - name: Unit tests (PHPUnit)
        run: vendor/bin/phpunit
